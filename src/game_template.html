<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>16-0 | Build the Ultimate All-Time IPL XI</title>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3efe5; --bg2:#ece5d7; --panel:#ffffff; --panel2:#f6f1e7; --line:#ddd3c0;
    --txt:#191510; --muted:#6e6453; --faint:#9c917d;
    --accent:#c2912b; --accent-dim:rgba(194,145,43,.12); --accent-bd:rgba(194,145,43,.5);
    --accent2:#13713f; --blue:#1c3aa0;
    --ind:#13713f; --ovs:#1c3aa0; --bad:#b23c22; --good:#13713f;
    --serif:'EB Garamond',Georgia,serif; --sans:'Oswald','Segoe UI',sans-serif;
    --shadow:0 2px 18px rgba(70,52,16,.08); --field:#2f7d4a; --field2:#2a6f42;
  }
  [data-theme="dark"]{
    --bg:#0c0f17; --bg2:#141826; --panel:#161b2a; --panel2:#1b2132; --line:#2b3350;
    --txt:#e9e6dd; --muted:#9a9484; --faint:#5a5a6a;
    --accent:#deb24a; --accent-dim:rgba(222,178,74,.14); --accent-bd:rgba(222,178,74,.5);
    --accent2:#34a05f; --blue:#5b7bf0;
    --ind:#2f9a52; --ovs:#4a73e0; --bad:#d65a44; --good:#2f9a52;
    --shadow:0 2px 18px rgba(0,0,0,.45); --field:#1f5e36; --field2:#1a5230;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:var(--sans);
    font-weight:400;min-height:100vh;-webkit-tap-highlight-color:transparent;transition:background .3s}
  .wrap{max-width:1180px;margin:0 auto;padding:20px 20px 60px}
  .topbar{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--line);
    padding-bottom:12px;margin-bottom:18px}
  .brand{display:flex;align-items:baseline;gap:12px}
  h1{font-family:var(--sans);font-size:34px;font-weight:700;margin:0;letter-spacing:4px;line-height:1}
  h1 span{color:var(--accent)}
  .kicker{font-size:11px;letter-spacing:4px;color:var(--faint);text-transform:uppercase;font-weight:500}
  .sub{font-family:var(--serif);font-style:italic;font-size:18px;color:var(--muted);margin:2px 0 18px;line-height:1.5}
  .theme-btn{background:var(--panel);border:2px solid var(--line);border-radius:0;width:40px;height:36px;
    font-size:16px;cursor:pointer;color:var(--txt);transition:.2s;padding:0;line-height:1;
    display:inline-flex;align-items:center;justify-content:center}
  .theme-btn:hover{border-color:var(--accent-bd)}
  .acct{background:var(--panel);border:2px solid var(--line);color:var(--txt);font-family:var(--sans);
    font-size:12px;font-weight:600;letter-spacing:1px;padding:8px 12px;text-transform:uppercase;cursor:pointer}
  .acct:hover{border-color:var(--accent-bd);color:var(--accent)}
  /* modals */
  .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;
    z-index:50;padding:20px}
  .modal{background:var(--panel);border:2px solid var(--accent-bd);box-shadow:0 12px 50px rgba(0,0,0,.4);
    padding:24px;max-width:420px;width:100%}
  .modal.wide{max-width:560px}
  .modal-h{font-family:var(--sans);font-size:22px;font-weight:700;letter-spacing:2px;margin:0 0 8px;text-transform:uppercase}
  .modal-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:16px}
  .modal-foot{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
  .nameinput{width:100%;margin-top:14px;padding:13px 14px;font-family:var(--sans);font-size:16px;letter-spacing:1px;
    background:var(--panel2);border:2px solid var(--line);color:var(--txt)}
  .nameinput:focus{outline:none;border-color:var(--accent)}
  .ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;max-height:56vh;overflow:auto}
  @media(max-width:560px){.ach-grid{grid-template-columns:1fr}}
  .ach{display:flex;align-items:center;gap:10px;padding:11px 12px;border:2px solid var(--line);background:var(--panel2);opacity:.5}
  .ach.got{opacity:1;border-color:var(--accent-bd);background:var(--accent-dim)}
  .ach-ic{font-size:22px;flex-shrink:0;filter:grayscale(1)}
  .ach.got .ach-ic{filter:none}
  .ach-nm{font-size:14px;font-weight:600;letter-spacing:.5px}
  .ach-ds{font-family:var(--serif);font-style:italic;font-size:12px;color:var(--muted);line-height:1.3}
  .ach-ok{margin-left:auto;color:var(--accent);font-weight:800;font-size:16px}
  /* achievement pop-up */
  .toast-wrap{position:fixed;top:64px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:70;pointer-events:none}
  .toast{display:flex;align-items:center;gap:14px;padding:15px 24px;background:var(--panel);
    border:2px solid var(--accent);box-shadow:0 0 0 4px var(--accent-dim),0 14px 40px rgba(0,0,0,.5);
    min-width:280px;max-width:90vw;animation:achpop .5s cubic-bezier(.18,.9,.3,1.3) both}
  .toast-ic{font-size:34px;animation:achspin .6s ease both}
  .toast-lbl{font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--accent);font-weight:700}
  .toast-nm{font-size:19px;font-weight:700;letter-spacing:.5px;line-height:1.1}
  .toast-ds{font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--muted);margin-top:1px}
  @keyframes achpop{from{opacity:0;transform:translateY(-26px) scale(.82)}to{opacity:1;transform:none}}
  @keyframes achspin{from{transform:rotate(-25deg) scale(.4)}to{transform:none}}
  .grid{display:grid;grid-template-columns:1.05fr 1fr;gap:18px}
  @media(max-width:900px){.grid{grid-template-columns:1fr}}
  .panel{background:var(--panel);border:2px solid var(--line);border-radius:0;padding:18px;box-shadow:var(--shadow)}
  .panel h2{margin:0 0 14px;font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:3px;
    color:var(--muted);border-bottom:1px solid var(--line);padding-bottom:8px}
  button{font-family:var(--sans);cursor:pointer;border:none;border-radius:0;padding:12px 18px;font-weight:600;letter-spacing:1.5px}
  .btn-primary{background:var(--accent);color:#fff;text-transform:uppercase}
  .btn-ghost{background:var(--panel);color:var(--txt);border:2px solid var(--line);text-transform:uppercase;font-size:13px}
  .btn-ghost:hover{border-color:var(--accent-bd);color:var(--accent)}
  .btn-go{background:var(--blue);color:#fff;width:100%;font-size:16px;padding:16px;text-transform:uppercase;letter-spacing:4px}
  .btn-go:hover{filter:brightness(1.08)}
  .btn-reroll{width:100%;margin-top:8px;padding:9px;font-size:12px;background:transparent;letter-spacing:2px;
    border:2px dashed var(--line);color:var(--muted);text-transform:uppercase}
  .btn-reroll:not(:disabled):hover{border-color:var(--accent);color:var(--accent)}
  .btn-reroll:disabled{opacity:.4;cursor:not-allowed}
  .wheel{font-family:var(--sans);font-size:22px;font-weight:700;letter-spacing:1px;text-align:center;padding:18px;
    background:linear-gradient(135deg,var(--panel2),var(--bg2));border:2px solid var(--line);min-height:62px;
    display:flex;align-items:center;justify-content:center;text-transform:uppercase}
  .wheel.spinning{animation:pulse .5s ease}
  @keyframes pulse{0%{transform:scale(.96);opacity:.5}100%{transform:scale(1);opacity:1}}
  .season-tag{color:var(--accent);font-size:13px;display:block;margin-top:4px;letter-spacing:2px}
  .players{display:flex;flex-direction:column;gap:7px;margin-top:12px}
  .pcard{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--panel2);border:2px solid var(--line);padding:9px 11px;transition:.15s;cursor:pointer}
  .pcard:not(.dis):hover{border-color:var(--accent);background:var(--accent-dim)}
  .pcard.dis{opacity:.34;cursor:not-allowed}
  .pleft{display:flex;align-items:center;gap:10px;min-width:0}
  .badge{font-size:9px;font-weight:600;padding:2px 6px;flex-shrink:0;color:#fff;letter-spacing:1px}
  .b-ind{background:var(--ind)} .b-ovs{background:var(--ovs)}
  .line{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--muted)}
  .rating{font-weight:700;font-size:19px;color:var(--accent);flex-shrink:0}
  .name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.5px}
  .xi{display:flex;flex-direction:column;gap:5px}
  .slot{display:flex;align-items:center;gap:8px;background:var(--panel2);border:2px dashed var(--line);
    padding:7px 10px;min-height:40px}
  .slot.filled{border-style:solid}
  .slot.elig{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .slotrole{font-size:11px;color:var(--muted);width:96px;flex-shrink:0;text-transform:uppercase;letter-spacing:1px}
  .slotname{flex:1;min-width:0;letter-spacing:.5px}
  .batpos{width:22px;flex-shrink:0;text-align:center;font-weight:700;font-size:14px;color:var(--accent)}
  .ord-arrows{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
  .ord-btn{padding:0;width:22px;height:15px;line-height:1;font-size:9px;background:var(--panel);
    border:1px solid var(--line);color:var(--muted);border-radius:0}
  .ord-btn:not(:disabled):hover{border-color:var(--accent);color:var(--accent)}
  .ord-btn:disabled{opacity:.25;cursor:not-allowed}
  .meta{display:flex;gap:18px;flex-wrap:wrap;margin:14px 0;color:var(--muted);font-size:12.5px;align-items:center;
    text-transform:uppercase;letter-spacing:1.5px}
  .meta b{color:var(--txt);font-size:15px}
  .over-ok{color:var(--good)} .over-bad{color:var(--bad)}
  .result{text-align:center;padding:8px}
  .record{font-size:54px;font-weight:700;letter-spacing:3px;color:var(--blue)}
  .trophy{font-size:17px;margin-top:6px;letter-spacing:2px;text-transform:uppercase}
  .small{font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--muted);letter-spacing:0}
  table{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:10px}
  th,td{text-align:left;padding:6px 6px;border-bottom:1px solid var(--line)}
  th{color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:1px;font-size:11px}
  tr.you td{color:var(--accent);font-weight:700}
  .center{text-align:center}
  .toggle{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);cursor:pointer;
    text-transform:uppercase;letter-spacing:1.5px}
  .hardtog{display:inline-flex;align-items:center;gap:9px;padding:10px 18px;border:2px solid var(--line);
    background:var(--panel);font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:2px;
    text-transform:uppercase;cursor:pointer;color:var(--muted);transition:.2s}
  .hardtog:hover{border-color:var(--accent-bd)}
  .hardtog.on{border-color:var(--accent);background:var(--accent-dim);color:var(--accent)}
  .hardtog .htdot{width:11px;height:11px;border-radius:50%;background:var(--line);transition:.2s}
  .hardtog.on .htdot{background:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
  .hardtog .htstate{font-weight:700}
  .forms{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
  @media(max-width:760px){.forms{grid-template-columns:1fr}}
  .form{background:var(--panel);border:2px solid var(--line);padding:16px;cursor:pointer;transition:.15s}
  .form:hover{border-color:var(--accent);background:var(--accent-dim)}
  .form h3{margin:0 0 4px;font-size:19px;font-weight:600;letter-spacing:2px}
  .form .desc{font-family:var(--serif);font-style:italic;color:var(--muted);font-size:14.5px;margin-bottom:10px;line-height:1.4}
  .chips{display:flex;flex-wrap:wrap;gap:5px}
  .chip{font-size:11px;background:var(--panel2);border:1px solid var(--line);padding:3px 9px;
    text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .matches{max-height:44vh;overflow:auto;margin-top:10px;text-align:left;border:2px solid var(--line)}
  .mrow{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-bottom:1px solid var(--line)}
  .mrow:last-child{border-bottom:none}
  .mrow.po{background:var(--accent-dim)}
  .res{font-weight:700;width:16px;flex-shrink:0;font-size:13px}
  .res.w{color:var(--good)} .res.l{color:var(--bad)}
  .mscore{flex:1;min-width:0;font-size:12.5px;letter-spacing:.3px}
  .mtop{color:var(--muted);font-size:11.5px;margin-top:2px;font-family:var(--serif);font-style:italic}
  .mtop .sc{color:var(--accent);font-style:normal}
  .reveal{animation:slidein .32s ease}
  @keyframes slidein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .caps{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .cap{display:flex;align-items:center;gap:8px;padding:10px 12px;text-align:left;border:2px solid var(--line)}
  .cap.orange{background:rgba(232,132,11,.12);border-color:rgba(232,132,11,.55)}
  .cap.purple{background:rgba(124,75,232,.12);border-color:rgba(124,75,232,.5)}
  .cap .capico{flex-shrink:0}
  .cap .caplbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .cap .capname{font-size:13.5px;font-weight:600;color:var(--txt);letter-spacing:.5px}
  .cap .capval{margin-left:auto;font-size:20px;font-weight:700}
  .cap.orange .capval{color:#e8740b} .cap.purple .capval{color:#7c4be8}
  @media(max-width:520px){.caps{grid-template-columns:1fr}}
  .units{display:flex;flex-direction:column;gap:10px;margin:4px 0 14px}
  .unit-top{display:flex;justify-content:space-between;align-items:baseline}
  .unit-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px}
  .unit-val{font-size:18px;font-weight:700}
  .unit-bar{height:6px;background:var(--line);overflow:hidden;margin-top:4px}
  .unit-fill{height:100%;transition:width .4s ease}
  .unit-fill.u-TOP{background:linear-gradient(90deg,#3aa0e8,#1c3aa0)}
  .unit-fill.u-MID{background:linear-gradient(90deg,#e8a83a,#e8740b)}
  .unit-fill.u-BOWL{background:linear-gradient(90deg,#9b6ce8,#7c4be8)}
  .unit-n{font-size:10.5px;color:var(--faint);margin-top:2px;text-transform:uppercase;letter-spacing:1px}
  .rankbox{display:flex;flex-direction:column;gap:2px;padding:11px 13px;border:2px solid var(--line);margin-bottom:14px;background:var(--panel2)}
  .rankbox.final{border-color:var(--accent);background:var(--accent-dim)}
  .rank-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:2px;color:var(--muted)}
  .rank-val{font-size:24px;font-weight:700}
  .rank-note{font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--muted)}
  .mvp-banner{display:flex;align-items:center;gap:13px;padding:15px;text-align:left;
    background:linear-gradient(105deg,var(--accent-dim),transparent);border:2px solid var(--accent-bd)}
  .mvp-medal{font-size:30px;flex-shrink:0}
  .mvp-body{flex:1;min-width:0}
  .mvp-lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:2px;color:var(--accent);font-weight:600}
  .mvp-name{font-size:20px;font-weight:600;color:var(--txt);line-height:1.1;letter-spacing:1px}
  .mvp-line{font-family:var(--serif);font-style:italic;font-size:13px;color:var(--muted);margin-top:2px}
  .mvp-pts{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
  .mvp-pts b{font-size:24px;font-weight:700;color:var(--accent);line-height:1}
  .mvp-pts span{font-size:8.5px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .awards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px}
  .award{display:flex;align-items:center;gap:8px;padding:10px 11px;text-align:left;border:2px solid var(--line);background:var(--panel2)}
  .award .aw-ico{font-size:17px;flex-shrink:0}
  .award .aw-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
  .award .aw-val{font-size:13.5px;font-weight:600;color:var(--txt);letter-spacing:.5px}
  @media(max-width:560px){.awards{grid-template-columns:1fr}}
  /* ===== editorial intro ===== */
  .intro{text-align:center;max-width:660px;margin:0 auto;padding:30px 0}
  .intro-badge{font-size:11px;letter-spacing:5px;color:var(--faint);border:1px solid var(--line);
    padding:7px 20px;display:inline-block;text-transform:uppercase}
  .intro-logo{font-size:84px;font-weight:700;letter-spacing:8px;color:var(--blue);line-height:1;margin:22px 0 0}
  .intro-logo span{color:var(--accent)}
  .intro-tagline{font-family:var(--serif);font-style:italic;font-size:20px;color:var(--muted);
    max-width:520px;margin:14px auto 0;line-height:1.6}
  .intro-divider{width:56px;height:2px;background:var(--accent);margin:24px auto}
  .section-label{font-size:11px;letter-spacing:4px;color:var(--faint);margin:0 0 14px;text-transform:uppercase;font-weight:500}
  .intro-foot{display:flex;align-items:center;justify-content:center;gap:24px;flex-wrap:wrap;margin-top:8px}
  .seasel{font-family:var(--sans);font-size:15px;font-weight:600;letter-spacing:2px;color:var(--txt);
    background:var(--panel);border:2px solid var(--line);padding:11px 16px;cursor:pointer;text-transform:uppercase}
  .seasel:hover{border-color:var(--accent-bd)}
  .seasel.mini{font-size:12px;padding:7px 10px;letter-spacing:1px}
  /* ===== cricket ground (formation visual) ===== */
  .ground-wrap{position:relative;width:100%;margin-bottom:14px}
  .ground{width:100%;display:block}
  .gchip{position:absolute;transform:translate(-50%,-50%);text-align:center;width:82px}
  .gchip .gc-role{font-size:8px;letter-spacing:1px;color:rgba(255,255,255,.7);text-transform:uppercase}
  .gchip .gc-name{font-size:11px;font-weight:600;color:#fff;letter-spacing:.3px;line-height:1.1;
    text-shadow:0 1px 3px rgba(0,0,0,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gchip .gc-dot{width:28px;height:28px;border-radius:50%;margin:0 auto 2px;display:flex;align-items:center;
    justify-content:center;font-size:9px;font-weight:700;border:2px solid rgba(255,255,255,.85);box-shadow:0 2px 6px rgba(0,0,0,.4)}
  .gchip.empty .gc-dot{background:rgba(255,255,255,.12);border-style:dashed}
  .gchip .gc-dot.d-TOP{background:#1c3aa0} .gchip .gc-dot.d-FIN{background:#e8740b}
  .gchip .gc-dot.d-WK{background:#c2912b} .gchip .gc-dot.d-AR{background:#13713f}
  .gchip .gc-dot.d-PACE{background:#b23c22} .gchip .gc-dot.d-SPIN{background:#7c4be8}
  /* ===== mobile ===== */
  @media(max-width:620px){
    .wrap{padding:12px 12px 48px}
    .topbar{flex-wrap:wrap;gap:10px}
    .brand{gap:8px}
    h1{font-size:26px;letter-spacing:3px}
    .kicker{font-size:10px;letter-spacing:2px}
    .sub{font-size:15px}
    .grid{gap:14px}
    .panel{padding:13px}
    .panel h2{font-size:13px;letter-spacing:2px}
    .meta{gap:10px 14px;font-size:11px;letter-spacing:1px}
    .meta b{font-size:13px}
    .acct{font-size:11px;padding:7px 9px}
    .btn-go{font-size:14px;letter-spacing:2px;padding:14px}
    .record{font-size:40px}
    /* intro */
    .intro{padding:14px 0}
    .intro-logo{font-size:54px;letter-spacing:5px}
    .intro-badge{font-size:10px;letter-spacing:3px;padding:6px 14px}
    .intro-tagline{font-size:16px}
    .section-label{font-size:10px;letter-spacing:3px}
    .seasel{font-size:13px;padding:10px 12px}
    /* cricket ground: tighter chips so they don't collide on a narrow field */
    .gchip{width:58px}
    .gchip .gc-name{font-size:9px}
    .gchip .gc-dot{width:23px;height:23px;font-size:8px}
    /* awards/caps already collapse; matches feed taller */
    .matches{max-height:50vh}

<body>
<div id="root"></div>
<script>const PLAYERS = __DATA__;</script>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

// small cricket-cap badge (like the real Orange/Purple cap)
function CapIcon({c}){
  return (
    <svg className="capico" viewBox="0 0 64 40" width="30" height="20" aria-hidden="true">
      <path d="M6 31 C4 24 11 9 32 9 C49 9 58 18 60 27 L60 30 C60 31 59 32 58 32 L32 32 Z" fill={c}/>
      <path d="M30 32 C30 33 33 35 44 35 C56 35 61 31 61 29 C61 31 60 32 58 32 Z" fill={c} opacity="0.78"/>
      <path d="M6 31 C4 24 11 9 32 9 C32 9 20 14 18 31 Z" fill="#fff" opacity="0.16"/>
      <circle cx="32" cy="9.5" r="2.4" fill={c}/>
      <path d="M31 18 C31 13 33 11 33 11" stroke="#fff" strokeOpacity="0.35" strokeWidth="1.4" fill="none"/>
      <path d="M40 19 C40 14 43 12 43 12" stroke="#fff" strokeOpacity="0.25" strokeWidth="1.2" fill="none"/>
    </svg>
  );
}

// Slot types & eligibility (role + batting position aware)
const bpOf=p=>p?(p.bp||6):6;   // highest batting position a player has historically batted (1-based)
const ROLE_NAME={BAT:"Batter",WK:"Keeper",AR:"All-rounder",PACE:"Pacer",SPIN:"Spinner",TOP:"Top order",FINISH:"Finisher",FLEX:"Middle"};
const SLOTDEF={
  TOP:  {label:"Top order", ok:p=>p.role==="BAT" && (p.pos==="TOP"||p.pos==="FLEX")},
  FIN:  {label:"Finisher",  ok:p=>p.role==="BAT" && (p.pos==="FINISH"||p.pos==="FLEX")},
  WK:   {label:"Wicketkeeper", ok:p=>p.role==="WK"},
  AR:   {label:"All-rounder",  ok:p=>p.role==="AR"},
  PACE: {label:"Pacer",   ok:p=>p.role==="PACE"},
  SPIN: {label:"Spinner", ok:p=>p.role==="SPIN"},
};
// Formations (each totals 11, keeper compulsory)
const FORMATIONS=[
  {name:"Balanced", desc:"The classic IPL XI — a bit of everything.",
   slots:["TOP","TOP","TOP","FIN","FIN","WK","AR","AR","PACE","PACE","SPIN"]},
  {name:"Batting heavy", desc:"Stack the line-up, bat deep, outscore everyone.",
   slots:["TOP","TOP","TOP","FIN","FIN","FIN","WK","AR","PACE","PACE","SPIN"]},
  {name:"Bowling heavy", desc:"Pace battery + extra spin to defend any total.",
   slots:["TOP","TOP","FIN","FIN","WK","AR","PACE","PACE","PACE","SPIN","SPIN"]},
  {name:"Spin heavy", desc:"Twin spinners to choke the middle overs.",
   slots:["TOP","TOP","TOP","FIN","FIN","WK","AR","PACE","PACE","SPIN","SPIN"]},
  {name:"All-rounder", desc:"Three all-rounders for maximum flexibility.",
   slots:["TOP","TOP","FIN","FIN","WK","AR","AR","AR","PACE","PACE","SPIN"]},
];
const MAX_OVERSEAS=4;
const sqKey=p=>p.team+"||"+p.season;
const allSquads=[...new Set(PLAYERS.map(sqKey))];
const rnd=a=>a[Math.floor(Math.random()*a.length)];
function gauss(m,s){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();
  return m+s*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}

// ---- IPL leagues: real franchises for every season, built from that season's squads ----
const avgR=arr=>arr.length?arr.reduce((a,p)=>a+p.r,0)/arr.length:78;
function buildLeague(season){
  const by={}; PLAYERS.filter(p=>p.season===season).forEach(p=>{(by[p.team]=by[p.team]||[]).push(p)});
  return Object.entries(by).map(([name,ps])=>{
    ps=ps.slice().sort((a,b)=>b.r-a.r); const xi=ps.slice(0,11);
    const rating=Math.round(xi.reduce((a,p)=>a+p.r,0)/Math.max(xi.length,1));
    const bats=(ps.filter(p=>p.role==="BAT"||p.role==="WK"||p.role==="AR").slice(0,7));
    const bowls=(ps.filter(p=>p.role==="PACE"||p.role==="SPIN"||p.role==="AR").slice(0,6));
    const abbr=name.replace("Royal Challengers ","RC ").split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,3);
    const B=bats.length?bats:xi.slice(0,6), W=bowls.length?bowls:xi.slice(0,5);
    return {name,abbr,rating,bats:B,bowls:W,batR:avgR(B),bowlR:avgR(W)};
  }).filter(t=>t.bats.length>=3);
}
const SEASONS=[...new Set(PLAYERS.map(p=>p.season))].sort((a,b)=>b-a)
  .filter(s=>buildLeague(s).length>=7);                 // seasons with a real league
const LEAGUES={}; SEASONS.forEach(s=>{LEAGUES[s]=buildLeague(s);});
// schedule that gives every team exactly 14 games for any league size N
function buildSchedule(N){
  const sched=[];
  for(let i=0;i<N;i++)for(let j=i+1;j<N;j++)sched.push([i,j]);   // round robin -> N-1 each
  let r=14-(N-1);                                                // remaining games per team
  if(r<=0) return sched;
  for(let o=1;o<=Math.floor(r/2);o++)for(let i=0;i<N;i++){const j=(i+o)%N;sched.push([Math.min(i,j),Math.max(i,j)]);}
  if(r%2===1 && N%2===0)for(let i=0;i<N/2;i++)sched.push([i,i+N/2]);  // one perfect matching for the odd remainder
  return sched;
}
const ri=(lo,hi)=>lo+Math.floor(Math.random()*(hi-lo+1));
const clmp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
function wpick(pool){const wt=pool.map(p=>Math.pow(Math.max(1,p.r-55),1.7));const tot=wt.reduce((a,b)=>a+b,0);
  let x=Math.random()*tot;for(let i=0;i<pool.length;i++){x-=wt[i];if(x<=0)return pool[i];}return pool[pool.length-1];}
// innings total = BATTING team's batting strength vs BOWLING team's bowling strength (a real contest)
const innTotal=(batTeam,bowlTeam)=>Math.max(108,Math.min(236,Math.round(
  160 + ((batTeam.batR||batTeam.rating)-80)*2.0 - ((bowlTeam.bowlR||bowlTeam.rating)-80)*1.5 + gauss(0,17))));
// distribute an innings' runs across the batting order; returns sorted [{name,runs}], updates season tally.
// CREDIT (0.66): named top-7 account for ~2/3 of runs; the rest is extras + lower order we don't track.
// Bounded power-form + ~40% cheap-dismissal chance keeps individual aggregates realistic (Orange cap ~600).
function batInnings(team,total,tally){
  const order=(team.bats&&team.bats.length)?team.bats.slice(0,7):[{name:"—",r:team.rating}];
  const raw=order.map(p=>{ const sk=Math.max(0.08,Math.min(1,((p.r||70)-58)/40));
    if(Math.random()<0.44-sk*0.08) return Math.random()*0.15;                 // cheap dismissal
    return (0.5+sk*1.2)*Math.pow(Math.random(),1.8); });                       // many small scores, few big
  const sr=raw.reduce((a,b)=>a+b,0)||1; const cards=[];
  order.forEach((p,i)=>{ const r=Math.round(total*0.66*raw[i]/sr);
    cards.push({name:p.name,runs:r});
    const t=tally[p.name]||(tally[p.name]={runs:0,wkts:0,team:team.abbr}); t.runs+=r; });
  cards.sort((a,b)=>b.runs-a.runs); return cards;
}
// spread wickets across the ~6 frontline bowlers with flat weighting -> Purple cap ~22, tight spread
function bowlInnings(bowlTeam,wk,tally){
  const pool=(bowlTeam.bowls&&bowlTeam.bowls.length)?bowlTeam.bowls.slice(0,6):[{name:"—",r:bowlTeam.rating}];
  const wt=pool.map(p=>Math.pow(Math.max(1,(p.r||70)-55),0.5)); const tot=wt.reduce((a,b)=>a+b,0)||1;
  for(let i=0;i<wk;i++){ let x=Math.random()*tot,pick=pool[pool.length-1];
    for(let k=0;k<pool.length;k++){x-=wt[k];if(x<=0){pick=pool[k];break;}}
    const t=tally[pick.name]||(tally[pick.name]={runs:0,wkts:0,team:bowlTeam.abbr}); t.wkts++; }
}
function playMatch(A,B,tally){
  // each innings is a contest: A bats vs B's attack, B bats vs A's attack
  let at=innTotal(A,B),bt=innTotal(B,A); if(at===bt)at+=(Math.random()<0.5?1:-1);
  // wickets tilt with the bowling-vs-batting gap: a sharper attack rips through more
  const awk=clmp(ri(2,5)+Math.round(((B.bowlR||B.rating)-(A.batR||A.rating))/10),1,9);
  const bwk=clmp(ri(2,5)+Math.round(((A.bowlR||A.rating)-(B.batR||B.rating))/10),1,9);
  const acards=batInnings(A,at,tally), bcards=batInnings(B,bt,tally);
  bowlInnings(B,awk,tally); bowlInnings(A,bwk,tally);
  const m={at,bt,awk,bwk,atop:acards[0],btop:bcards[0]};
  m.win=at>bt?A:B;m.lose=at>bt?B:A;return m;}
function youView(A,B,m,label){if(!A.you&&!B.you)return null;const ya=A.you,op=ya?B:A;
  return {label,opp:op.name,oppAbbr:op.abbr,won:m.win.you,
    meTot:ya?m.at:m.bt,meWk:ya?m.awk:m.bwk,opTot:ya?m.bt:m.at,opWk:ya?m.bwk:m.awk,
    meTop:ya?m.atop:m.btop,opTop:ya?m.btop:m.atop};}

// ---- achievements (saved per-profile in the browser) ----
const ACHIEVEMENTS=[
  {id:"draft",   icon:"📋", name:"Team Sheet",  desc:"Complete your first XI",                         chk:s=>s.drafts>=1},
  {id:"title",   icon:"🏆", name:"Champions",   desc:"Win your first IPL title",                       chk:s=>s.titles>=1},
  {id:"perfect", icon:"🔥", name:"Sixteen-Zero",desc:"Go a flawless 16-0",                             chk:s=>s.perfects>=1},
  {id:"dynasty", icon:"👑", name:"Dynasty",     desc:"Win 5 IPL titles",                               chk:s=>s.titles>=5},
  {id:"erahop",  icon:"🌍", name:"Era Hopper",  desc:"Win titles in 5 different seasons",              chk:s=>s.seasonsWon.length>=5},
  {id:"timelord",icon:"⏳", name:"Time Lord",   desc:"Win a title in the 2000s, 2010s and 2020s",      chk:s=>{const d=new Set(s.seasonsWon.map(y=>Math.floor(y/10)*10));return d.has(2000)&&d.has(2010)&&d.has(2020);}},
  {id:"hard",    icon:"🧠", name:"No Numbers",  desc:"Win a title with Hard mode on",                  chk:s=>s.hardTitles>=1},
  {id:"galactico",icon:"💎",name:"Galácticos",  desc:"Build an XI rated 90 or higher",                 chk:s=>s.bestRating>=90},
  {id:"cap",     icon:"🧢", name:"Cap Collector",desc:"One of your players wins the Orange or Purple Cap",chk:s=>s.capWins>=1},
  {id:"mvp",     icon:"⭐", name:"MVP Machine", desc:"One of your players is named season MVP",         chk:s=>s.mvpWins>=1},
  {id:"underdog",icon:"🐐", name:"Giant Killer",desc:"Win the title projected outside the top 4",       chk:s=>s.underdogTitles>=1},
  {id:"veteran", icon:"🏟️",name:"Veteran",     desc:"Simulate 25 seasons",                            chk:s=>s.sims>=25},
  {id:"quota",   icon:"✈️", name:"Full Quota",  desc:"Draft the maximum 4 overseas players",           chk:s=>s.overseasMax>=4},
  // ---- meme achievements ----
  {id:"blindfold",icon:"🥷",name:"Blindfold Perfect",desc:"Go a flawless 16-0 with Hard mode on",      chk:s=>s.perfectHard>=1},
  {id:"finally", icon:"🤡", name:"Finally!",    desc:"Watch Punjab or Delhi actually win the IPL",     chk:s=>s.punjabDc>=1},
  {id:"comeback",icon:"🌊", name:"Mumbai Special",desc:"Lose your first 5 games, then win the title",   chk:s=>s.comeback>=1},
  {id:"spoon",   icon:"🥄", name:"Wooden Spoon",desc:"Finish stone last on the table",                 chk:s=>s.woodenSpoon>=1},
  {id:"choke",   icon:"😬", name:"Minor Premiers",desc:"Top the league table but win no trophy",        chk:s=>s.choke>=1},
  {id:"whitewash",icon:"🫠",name:"Whitewashed", desc:"Lose all 14 league games",                       chk:s=>s.whitewash>=1},
  {id:"thala",   icon:"7️⃣", name:"Thala for a Reason",desc:"Finish a league season 7 wins, 7 losses",  chk:s=>s.place7>=1},
];
const BLANK_STATS={drafts:0,sims:0,titles:0,perfects:0,hardTitles:0,seasonsWon:[],capWins:0,mvpWins:0,bestRating:0,underdogTitles:0,overseasMax:0,
  perfectHard:0,punjabDc:0,comeback:0,woodenSpoon:0,choke:0,whitewash:0,place7:0};
const loadProfile=()=>{try{const j=JSON.parse(localStorage.getItem("ipl160_profile"));if(j&&j.stats)return {name:j.name||"",unlocked:j.unlocked||[],stats:{...BLANK_STATS,...j.stats}};}catch(e){}return {name:"",unlocked:[],stats:{...BLANK_STATS,seasonsWon:[]}};};

function App(){
  const [formation,setFormation]=useState(null);   // chosen FORMATION object
  const [xi,setXi]=useState([]);                    // array length 11 of player|null
  const [spin,setSpin]=useState(null);
  const [spinCount,setSpinCount]=useState(0);
  const [rerolls,setRerolls]=useState(2);           // two free re-rolls per game to dodge a squad
  const [result,setResult]=useState(null);
  const [hard,setHard]=useState(false);
  const [anim,setAnim]=useState(false);
  const [theme,setTheme]=useState("dark");
  const [simSeason,setSimSeason]=useState(SEASONS[0]);   // which IPL season's league you face
  const league=LEAGUES[simSeason]||[];
  const [battingOrder,setBattingOrder]=useState(null);   // user-set batting order (slot indices) once XI is full
  const [rev,setRev]=useState(0);                   // matches revealed so far (game-by-game)
  const feedEnd=useRef(null);
  useEffect(()=>{ document.documentElement.setAttribute("data-theme",theme); },[theme]);
  // ---- profile + achievements (persisted on this device) ----
  const [profile,setProfile]=useState(loadProfile);
  const [showAch,setShowAch]=useState(false);
  const [toasts,setToasts]=useState([]);
  useEffect(()=>{ try{localStorage.setItem("ipl160_profile",JSON.stringify(profile));}catch(e){} },[profile]);
  useEffect(()=>{ if(!toasts.length)return; const id=setTimeout(()=>setToasts(t=>t.slice(1)),4500); return ()=>clearTimeout(id); },[toasts]);
  const unlockedCount=profile.unlocked.length;
  // apply a stats update, then unlock any newly-earned achievements (with a toast)
  function bump(updater){
    setProfile(p=>{
      const stats=updater(p.stats);
      const newly=ACHIEVEMENTS.filter(a=>a.chk(stats)&&!p.unlocked.includes(a.id));
      if(newly.length) setTimeout(()=>setToasts(t=>[...t,...newly.map(a=>({...a,key:Math.random()}))]),0);
      return {...p,stats,unlocked:newly.length?[...p.unlocked,...newly.map(a=>a.id)]:p.unlocked};
    });
  }
  function resetProfile(){ setProfile({name:"",unlocked:[],stats:{...BLANK_STATS,seasonsWon:[]}}); setShowAch(false); }
  // reveal the season one game at a time once a result is set
  useEffect(()=>{
    if(!result){setRev(0);return;}
    setRev(0);
    const total=result.feed.length; let n=0;
    const id=setInterval(()=>{ n++; setRev(n); if(n>=total)clearInterval(id); },520);
    return ()=>clearInterval(id);
  },[result]);
  useEffect(()=>{ if(result&&feedEnd.current)feedEnd.current.scrollIntoView({behavior:"smooth",block:"nearest"}); },[rev,result]);

  function chooseFormation(f){
    setFormation(f); setXi(Array(f.slots.length).fill(null));
    setSpin(null);setSpinCount(0);setRerolls(2);setResult(null);setBattingOrder(null);
  }
  function restart(){setFormation(null);setXi([]);setSpin(null);setSpinCount(0);setRerolls(2);setResult(null);setBattingOrder(null);}
  function doReroll(){ if(!spin||rerolls<=0)return; setRerolls(r=>r-1); doSpin(); }

  const themeBtn=(
    <button className="theme-btn" title="Toggle theme" onClick={()=>setTheme(t=>t==="light"?"dark":"light")}>
      {theme==="light"?"🌙":"☀"}
    </button>
  );
  const accountBar=(
    <button className="acct" onClick={()=>setShowAch(true)} title="Achievements">🏆 {unlockedCount}/{ACHIEVEMENTS.length}</button>
  );
  const overlays=(
    <>
      {showAch && (
        <div className="modal-ov" onClick={()=>setShowAch(false)}>
          <div className="modal wide" onClick={e=>e.stopPropagation()}>
            <div className="modal-top">
              <div><h3 className="modal-h">Achievements</h3>
                <div className="small">{unlockedCount} of {ACHIEVEMENTS.length} unlocked · {profile.stats.titles} titles · {profile.stats.sims} seasons played</div></div>
              <button className="theme-btn" onClick={()=>setShowAch(false)}>✕</button>
            </div>
            <div className="ach-grid">
              {ACHIEVEMENTS.map(a=>{const got=profile.unlocked.includes(a.id);return (
                <div key={a.id} className={"ach"+(got?" got":"")}>
                  <span className="ach-ic">{a.icon}</span>
                  <div style={{minWidth:0}}><div className="ach-nm">{a.name}</div><div className="ach-ds">{a.desc}</div></div>
                  {got&&<span className="ach-ok">✓</span>}
                </div>
              );})}
            </div>
            <div className="modal-foot">
              <button className="btn-ghost" onClick={resetProfile}>Reset progress</button>
            </div>
          </div>
        </div>
      )}
      {toasts.length>0 && (
        <div className="toast-wrap">
          {toasts.map(t=>(
            <div key={t.key} className="toast"><span className="toast-ic">{t.icon}</span>
              <div><div className="toast-lbl">🏆 Achievement unlocked</div><div className="toast-nm">{t.name}</div>
                <div className="toast-ds">{t.desc}</div></div></div>
          ))}
        </div>
      )}
    </>
  );

  if(!formation){
    return (
      <div className="wrap">
        {overlays}
        <div className="topbar">
          <span className="kicker">IPL · All Seasons · 2008–2026</span>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>{accountBar}{themeBtn}</div>
        </div>
        <div className="intro">
          <span className="intro-badge">Indian Premier League</span>
          <div className="intro-logo">16<span>·0</span></div>
          <div className="intro-tagline">Spin the slot, draft a real IPL squad player by player, and chase a flawless 16-0 — win all 14 and lift the cup.</div>
          <div className="intro-divider"></div>
          <div className="section-label">Choose your formation</div>
          <div className="forms">
            {FORMATIONS.map((f,i)=>{
              const c={};f.slots.forEach(s=>c[s]=(c[s]||0)+1);
              return (
                <div key={i} className="form" onClick={()=>chooseFormation(f)}>
                  <h3>{f.name}</h3>
                  <div className="desc">{f.desc}</div>
                  <div className="chips">
                    {(c.TOP||0)>0 && <span className="chip">{c.TOP} Top order</span>}
                    {(c.FIN||0)>0 && <span className="chip">{c.FIN} Finisher</span>}
                    {(c.WK||0)>0 && <span className="chip">{c.WK} Keeper</span>}
                    {(c.AR||0)>0 && <span className="chip">{c.AR} All-rounder</span>}
                    {(c.PACE||0)>0 && <span className="chip">{c.PACE} Pace</span>}
                    {(c.SPIN||0)>0 && <span className="chip">{c.SPIN} Spin</span>}
                  </div>

            })}
          </div>

          <div className="section-label">Which season's league will you face?</div>
          <select className="seasel" value={simSeason} onChange={e=>setSimSeason(+e.target.value)}>
            {SEASONS.map(s=><option key={s} value={s}>IPL {s} · {LEAGUES[s].length} teams</option>)}
          </select>
          <div className="intro-divider"></div>
          <div className="intro-foot">
            <button className={"hardtog"+(hard?" on":"")} onClick={()=>setHard(h=>!h)}

            </button>

    );
  }

  const slots=formation.slots.map((t,i)=>({i,type:t,...SLOTDEF[t]}));
  // batting-order display: openers, then all-rounders (before finishers), keeper, finishers, then bowlers
  const SLOT_ORDER={TOP:0,AR:1,WK:2,FIN:3,PACE:4,SPIN:5};
  const slotsDisplay=slots.slice().sort((a,b)=>(SLOT_ORDER[a.type]-SLOT_ORDER[b.type])||(a.i-b.i));
  const filled=xi.filter(Boolean);
  const overseasCount=filled.filter(p=>p.ovs).length;
  const openSlots=slots.filter(s=>!xi[s.i]);
  const teamRating=filled.length?Math.round(filled.reduce((a,p)=>a+p.r,0)/filled.length):0;
  const complete=filled.length===slots.length;
  const hideR=hard&&!complete;   // hard mode hides ratings while drafting, then reveals once the XI is full
  // ---- batting order: a sensible default (by historical position, then rating) that the user can tweak ----
  const defaultOrder=()=>slots.filter(s=>xi[s.i]).map(s=>s.i).sort((a,b)=>(bpOf(xi[a])-bpOf(xi[b]))||(xi[b].r-xi[a].r));
  const orderValid=battingOrder&&battingOrder.length===filled.length&&battingOrder.every(i=>xi[i]);
  const battOrder=complete?(orderValid?battingOrder:defaultOrder()):null;   // slot indices in batting order
  const canUp=idx=>battOrder&&idx>0&&bpOf(xi[battOrder[idx]])<=idx;          // can this player bat one spot higher?
  const canDown=idx=>battOrder&&idx<battOrder.length-1&&bpOf(xi[battOrder[idx+1]])<=idx+1; // can the one below come up?
  function moveBat(idx,dir){
    const base=battOrder||defaultOrder(); const j=idx+dir; if(j<0||j>=base.length)return;
    if(bpOf(xi[base[idx]])>j+1||bpOf(xi[base[j]])>idx+1)return;   // respect each player's highest valid position
    const nx=base.slice(); const t=nx[idx];nx[idx]=nx[j];nx[j]=t; setBattingOrder(nx);
  }
  // ---- live unit-strength breakdown: Top order / Middle order / Bowling ----
  const _avg=arr=>arr.length?Math.round(arr.reduce((a,p)=>a+p.r,0)/arr.length):0;
  // unit averages are based on the SLOT a player is drafted into (their position in the team), not their tag
  const inSlots=types=>slots.filter(s=>types.includes(s.type)&&xi[s.i]).map(s=>xi[s.i]);
  const topUnit=inSlots(["TOP"]);
  const midUnit=inSlots(["FIN","WK","AR"]);
  const bowlUnit=inSlots(["PACE","SPIN","AR"]);
  const units=[{k:"TOP",label:"Top order",r:_avg(topUnit),n:topUnit.length},
               {k:"MID",label:"Middle / finish",r:_avg(midUnit),n:midUnit.length},
               {k:"BOWL",label:"Bowling",r:_avg(bowlUnit),n:bowlUnit.length}];
  // ---- projected league rank vs the real 2026 field (you + 10 franchises = 11) ----
  const fieldR=league.map(t=>t.rating);
  const projRank=teamRating?1+fieldR.filter(r=>r>teamRating).length:null;
  const ordSuffix=n=>{const s=["th","st","nd","rd"],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);};
  // ---- cricket-ground layout: fixed role lanes; keeper always centred behind the stumps ----
  const LANES={TOP:{y:16,ins:30},AR:{y:33,ins:19},FIN:{y:50,ins:22},WK:{y:64,ins:0},BOWL:{y:82,ins:30}};
  const laneKey=t=>(t==="TOP"||t==="FIN"||t==="AR"||t==="WK")?t:"BOWL";   // PACE/SPIN -> BOWL lane
  const groups={};
  slots.forEach(s=>{const k=laneKey(s.type);(groups[k]=groups[k]||[]).push(s);});
  const gpos={};
  Object.entries(groups).forEach(([k,arr])=>{const L=LANES[k],n=arr.length;
    arr.forEach((s,i)=>{gpos[s.i]={x:(n===1)?50:L.ins+(100-2*L.ins)*i/(n-1),y:L.y};});});
  const lastName=n=>{const a=n.trim().split(" ");return a[a.length-1];};
  const dotKey=(p,s)=> p ? (p.role==="BAT"?(p.pos==="FINISH"?"FIN":"TOP"):(p.role==="WK"?"WK":p.role)) : s.type;

  function eligibleSlot(p){
    if(filled.some(q=>q.name===p.name)) return null;
    if(p.ovs && overseasCount>=MAX_OVERSEAS) return null;
    return openSlots.find(s=>s.ok(p))||null;
  }
  function doSpin(){
    const usable=allSquads.filter(sq=>PLAYERS.some(p=>sqKey(p)===sq && eligibleSlot(p)));
    setAnim(true);setTimeout(()=>setAnim(false),450);
    setSpin(rnd(usable.length?usable:allSquads));setSpinCount(c=>c+1);setResult(null);
  }
  function draft(p){
    const slot=eligibleSlot(p); if(!slot) return;
    const nx=[...xi]; nx[slot.i]={...p}; setXi(nx); setSpin(null);
    const fl=nx.filter(Boolean);
    if(fl.length===slots.length){   // XI just completed -> record draft achievements
      const rating=Math.round(fl.reduce((a,q)=>a+q.r,0)/fl.length), ovs=fl.filter(q=>q.ovs).length;
      bump(s=>({...s,drafts:s.drafts+1,bestRating:Math.max(s.bestRating,rating),overseasMax:Math.max(s.overseasMax,ovs)}));
    }
  }

  function simulate(){
    const myBats=filled.filter(p=>p.role==="BAT"||p.role==="WK"||p.role==="AR");
    const myBowls=filled.filter(p=>p.role==="PACE"||p.role==="SPIN"||p.role==="AR");
    const orderedXI=(battOrder||defaultOrder()).map(i=>xi[i]);   // user's batting line-up feeds who scores
    const you={name:"YOUR XI",abbr:"YOU",rating:teamRating,you:true,pts:0,w:0,l:0,
      bats:orderedXI,bowls:myBowls,batR:avgR(myBats),bowlR:avgR(myBowls)};
    // the chosen season's real franchises + your XI
    const teams=[you,...league.map(t=>({...t,pts:0,w:0,l:0}))];
    const N=teams.length;
    const tally={};                                         // player -> {runs,wkts,team}
    const sched=buildSchedule(N);                           // every team plays exactly 14 league games
    const myMatches=[];
    sched.forEach(([i,j])=>{
      const A=teams[i],B=teams[j],m=playMatch(A,B,tally);
      m.win.pts+=2;m.win.w++;m.lose.l++;
      const yv=youView(A,B,m); if(yv) myMatches.push(yv);
    });
    teams.sort((a,b)=>b.pts-a.pts||b.rating-a.rating);
    const top4=teams.slice(0,4),made=top4.includes(you);
    const playoffs=[];
    // playoffs always resolve so the league has a champion + MVP even if you miss out
    const[t1,t2,t3,t4]=top4;
    const q1=playMatch(t1,t2,tally),el=playMatch(t3,t4,tally);
    const q2=playMatch(q1.lose,el.win,tally),fin=playMatch(q1.win,q2.win,tally);
    [[t1,t2,q1,"Qualifier 1"],[t3,t4,el,"Eliminator"],[q1.lose,el.win,q2,"Qualifier 2"],[q1.win,q2.win,fin,"Final"]]
      .forEach(([A,B,m,lab])=>{const yv=youView(A,B,m,lab);if(yv)playoffs.push(yv);});
    const champTeam=fin.win, champion=fin.win===you, pw=playoffs.filter(p=>p.won).length;
    const champName=champTeam.you?"YOUR XI":champTeam.name;
    const stage=champion?"CHAMPIONS":(made?"Lost in the playoffs":"Missed the playoffs");
    // ---- season awards from the per-player tally ----
    const arr=Object.entries(tally).map(([name,t])=>({name,...t}));
    const orange=arr.slice().sort((a,b)=>b.runs-a.runs)[0]||{name:"—",runs:0,team:""};
    const purple=arr.slice().sort((a,b)=>b.wkts-a.wkts)[0]||{name:"—",wkts:0,team:""};
    // MVP index: runs + wickets*20, plus a bonus for going deep (champions / finalists)
    const finalists=new Set([fin.win.abbr,fin.lose.abbr]);
    const score=arr.map(x=>({...x,mvpPts:x.runs+x.wkts*20+(x.team===champTeam.abbr?40:(finalists.has(x.team)?18:0))}));
    const mvp=score.slice().sort((a,b)=>b.mvpPts-a.mvpPts)[0]||{name:"—",runs:0,wkts:0,team:"",mvpPts:0};
    const allr=score.filter(x=>x.wkts>=6&&x.runs>=110).sort((a,b)=>b.mvpPts-a.mvpPts)[0]||null;
    // Player of the Final = the higher top score across the two final innings
    const poFinal=(fin.atop.score>=fin.btop.score)
      ? {name:fin.atop.name,score:fin.atop.score,team:q1.win.abbr}
      : {name:fin.btop.name,score:fin.btop.score,team:q2.win.abbr};
    const feed=[...myMatches.map(m=>({...m,playoff:false})),...playoffs.map(m=>({...m,playoff:true}))];
    setResult({teams,you:{...you},stage,champion,champName,pw,made,perfect:you.w===14&&champion,
      feed,orange,purple,mvp,allr,poFinal,season:simSeason});
    // ---- record achievement stats for this campaign ----
    const projR=1+fieldR.filter(r=>r>teamRating).length;
    const lostFirst5=myMatches.length>=5 && myMatches.slice(0,5).every(m=>!m.won);
    const champPunjabDc=!champion && /Punjab|Delhi/.test(champName);
    const lastIsYou=teams[teams.length-1]===you, topIsYou=teams[0]===you;
    bump(s=>{
      const ns={...s,sims:s.sims+1};
      if(champion){
        ns.titles=s.titles+1;
        ns.seasonsWon=s.seasonsWon.includes(simSeason)?s.seasonsWon:[...s.seasonsWon,simSeason];
        if(hard)ns.hardTitles=s.hardTitles+1;
        if(you.w===14)ns.perfects=s.perfects+1;
        if(you.w===14&&hard)ns.perfectHard=s.perfectHard+1;
        if(projR>=5)ns.underdogTitles=s.underdogTitles+1;
        if(lostFirst5)ns.comeback=s.comeback+1;
      }
      if(champPunjabDc)ns.punjabDc=s.punjabDc+1;
      if(lastIsYou)ns.woodenSpoon=s.woodenSpoon+1;
      if(topIsYou&&!champion)ns.choke=s.choke+1;
      if(you.w===7&&you.l===7)ns.place7=s.place7+1;
      if(you.w===0)ns.whitewash=s.whitewash+1;
      if(orange.team==="YOU"||purple.team==="YOU")ns.capWins=s.capWins+1;
      if(mvp.team==="YOU")ns.mvpWins=s.mvpWins+1;
      return ns;
    });
    setSpin(null);
  }

  // in hard mode, order by name (neutral) so the rating ranking isn't leaked; otherwise best-first
  const squadPlayers=spin?PLAYERS.filter(p=>sqKey(p)===spin)
    .sort((a,b)=>hard?a.name.localeCompare(b.name):b.r-a.r):[];
  const [tName,tSeason]=spin?spin.split("||"):["",""];

  return (
    <div className="wrap">
      {overlays}
      <div className="topbar">
        <div className="brand">
          <h1>16<span>·0</span></h1>
          <span className="kicker">{formation.name} formation</span>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",justifyContent:"flex-end"}}>
          {accountBar}
          <button className="btn-ghost" style={{padding:"8px 14px"}} onClick={restart}>↺ New game</button>
          {themeBtn}
        </div>
      </div>
      <div className="meta">
        <span>XI <b>{filled.length}/{slots.length}</b></span>
        <span className={overseasCount>MAX_OVERSEAS?"over-bad":"over-ok"}>Overseas <b>{overseasCount}/{MAX_OVERSEAS}</b></span>
        <span>Rating <b>{hideR?"—":(teamRating||"—")}</b></span>
        <span>Spins <b>{spinCount}</b></span>
        <span>Re-rolls <b>{rerolls}</b></span>
        <span style={{display:"inline-flex",alignItems:"center",gap:6}}>Season
          <select className="seasel mini" value={simSeason} onChange={e=>setSimSeason(+e.target.value)}>
            {SEASONS.map(s=><option key={s} value={s}>IPL {s}</option>)}
          </select>
        </span>
        <button className={"hardtog"+(hard?" on":"")} onClick={()=>setHard(h=>!h)}
          title="Hide every rating and stat until your XI is complete">
          <span className="htdot"/> Hard mode <span className="htstate">{hard?"ON":"OFF"}</span>
        </button>
      </div>

      <div className="grid">
        <div className="panel">
          <h2>Spin &amp; Draft</h2>
          {!complete && (
            <>
              <div className={"wheel"+(anim?" spinning":"")}>
                {spin?<div>{tName}<span className="season-tag">{tSeason} squad</span></div>
                     :<div style={{color:"var(--muted)"}}>Spin to land on an IPL squad</div>}
              </div>
              <button className="btn-primary" style={{width:"100%",marginTop:12,opacity:spin?0.4:1}} onClick={doSpin} disabled={!!spin}>{spin?"⛔ Draft a player below first":"🎡 Spin the wheel"}</button>
              {spin && (
                <button className="btn-reroll" onClick={doReroll} disabled={rerolls<=0}>
                  {rerolls>0?"🎲 Re-roll this squad ("+rerolls+" left)":"🎲 Re-roll used — draft a player"}
                </button>
              )}
              {spin && (
                <div className="players">
                  {squadPlayers.map((p,i)=>{
                    const ok=!!eligibleSlot(p);
                    return (
                      <div key={i} className={"pcard"+(ok?"":" dis")} style={{cursor:ok?"pointer":"not-allowed"}} onClick={()=>ok&&draft(p)}>
                        <div className="pleft">
                          <span className={"badge "+(p.ovs?"b-ovs":"b-ind")}>{p.ovs?"OVS":"IND"}</span>
                          <div style={{minWidth:0}}><div className="name">{p.name}</div>
                            <div className="line">{p.role==="BAT"?ROLE_NAME[p.pos]:ROLE_NAME[p.role]}{hard?"":" · "+p.line}</div></div>
                        </div>
                        <div className="rating">{hard?"·":p.r}</div>
                      </div>
                    );
                  })}
                  <div className="small">Tap to draft (it's locked in — no takebacks). Greyed = no open slot, overseas cap reached, or already picked.</div>
                </div>
              )}
            </>
          )}
          {complete && !result && (
            <div className="center" style={{padding:"18px 0"}}>
              <p>Your XI is locked in. Time to find out how far it goes.</p>
              <button className="btn-go" onClick={simulate}>▶ Simulate the season</button>
            </div>
          )}
          {result && (()=>{ const done=rev>=result.feed.length; const wins=result.feed.slice(0,rev).filter(m=>!m.playoff&&m.won).length; const losses=result.feed.slice(0,rev).filter(m=>!m.playoff&&!m.won).length; return (
            <div className="result">
              <div className="record">{done?`${result.you.w}-${result.you.l}`:`${wins}-${losses}`}</div>
              <div className="small">{done?"final league record · 14 games":`simulating… ${rev}/${result.feed.length}`}</div>
              {done && (
              <div className="trophy">
                {result.champion?"🏆 IPL "+result.season+" CHAMPIONS":result.stage}
                {result.pw>0 && <span className="small"> · {result.pw} playoff win{result.pw>1?"s":""}</span>}
                {result.perfect && <div style={{color:"var(--accent)",marginTop:6,fontWeight:800}}>🔥 PERFECT 16-0 — unbeaten champions!</div>}
              </div>)}
              <h2 style={{margin:"14px 0 6px"}}>Your season · match by match</h2>
              <div className="matches">
                {result.feed.slice(0,rev).map((m,i)=>(
                  <div key={i} className={"mrow reveal"+(m.playoff?" po":"")}>
                    <span className={"res "+(m.won?"w":"l")}>{m.won?"W":"L"}</span>
                    <div className="mscore">
                      <div>{m.playoff?<b style={{color:"var(--accent)"}}>{m.label}</b>:`Match ${i+1}`} · vs {m.opp}</div>
                      <div className="mtop">YOU <b style={{color:"var(--txt)"}}>{m.meTot}/{m.meWk}</b> · {m.oppAbbr} {m.opTot}/{m.opWk}  —  ★ <span className="sc">{m.meTop.name} {m.meTop.score}</span> · {m.opTop.name} {m.opTop.score}</div>
                    </div>
                  </div>
                ))}
                <div ref={feedEnd}/>
              </div>
              {done && (<>
              <h2 style={{margin:"14px 0 6px"}}>Season awards</h2>
              <div className="mvp-banner">
                <div className="mvp-medal">🏅</div>
                <div className="mvp-body">
                  <div className="mvp-lbl">Most Valuable Player</div>
                  <div className="mvp-name">{result.mvp.name}</div>
                  <div className="mvp-line">{result.mvp.runs} runs · {result.mvp.wkts} wkts · {result.mvp.team}</div>
                </div>
                <div className="mvp-pts"><b>{result.mvp.mvpPts}</b><span>pts</span></div>
              </div>
              <div className="awards">
                <div className="award"><span className="aw-ico">🏆</span><div><div className="aw-lbl">Champions</div><div className="aw-val">{result.champName}</div></div></div>
                <div className="award"><span className="aw-ico">🎯</span><div><div className="aw-lbl">Player of the Final</div><div className="aw-val">{result.poFinal.name} <span className="small">· {result.poFinal.score} ({result.poFinal.team})</span></div></div></div>
                {result.allr && <div className="award"><span className="aw-ico">🔄</span><div><div className="aw-lbl">Best all-rounder</div><div className="aw-val">{result.allr.name} <span className="small">· {result.allr.runs}r / {result.allr.wkts}w</span></div></div></div>}
              </div>
              <div className="caps">
                <div className="cap orange"><CapIcon c="#ff8a00"/><div><div className="caplbl">Orange Cap · most runs</div><div className="capname">{result.orange.name}</div></div><div className="capval">{result.orange.runs}</div></div>
                <div className="cap purple"><CapIcon c="#9b5cff"/><div><div className="caplbl">Purple Cap · most wickets</div><div className="capname">{result.purple.name}</div></div><div className="capval">{result.purple.wkts}</div></div>
              </div>
              <h2 style={{margin:"14px 0 0"}}>Final table</h2>
              <table>
                <thead><tr><th>#</th><th>Team</th><th>W</th><th>L</th><th>Pts</th></tr></thead>
                <tbody>{result.teams.map((t,i)=>(
                  <tr key={i} className={t.you?"you":""}><td>{i+1}</td><td>{t.you?"YOUR XI":t.name}</td><td>{t.w}</td><td>{t.l}</td><td>{t.pts}</td></tr>
                ))}</tbody>
              </table>
              <div style={{display:"flex",gap:8,marginTop:12,justifyContent:"center"}}>
                <button className="btn-ghost" onClick={simulate}>↻ Re-simulate</button>
                <button className="btn-ghost" onClick={restart}>＋ New game</button>
              </div>
              </>)}
            </div>
          );})()}
        </div>

        <div className="panel">
          <h2>Your XI · avg {hideR?"—":(teamRating||"—")}</h2>
          <div className="ground-wrap">
            <svg className="ground" viewBox="0 0 320 300" preserveAspectRatio="xMidYMid meet">
              <defs>
                <radialGradient id="grass" cx="50%" cy="42%" r="65%">
                  <stop offset="0%" stopColor="var(--field)"/><stop offset="100%" stopColor="var(--field2)"/>
                </radialGradient>
              </defs>
              <rect x="0" y="0" width="320" height="300" fill="transparent"/>
              <ellipse cx="160" cy="150" rx="152" ry="142" fill="url(#grass)" stroke="rgba(255,255,255,.35)" strokeWidth="2"/>
              <ellipse cx="160" cy="150" rx="150" ry="140" fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="14"/>
              <ellipse cx="160" cy="150" rx="94" ry="88" fill="none" stroke="rgba(255,255,255,.28)" strokeWidth="1.5" strokeDasharray="3 4"/>
              <rect x="150" y="112" width="20" height="76" rx="2" fill="rgba(232,222,192,.9)"/>
              <line x1="160" y1="118" x2="160" y2="182" stroke="rgba(120,90,40,.5)" strokeWidth="1"/>
            </svg>
            {slots.map(s=>{ const p=xi[s.i]; const g=gpos[s.i]; const elig=spin && !p && squadPlayers.some(q=>{const e=eligibleSlot(q);return e&&e.i===s.i;});
              return (
                <div key={s.i} className={"gchip"+(p?"":" empty")} style={{left:g.x+"%",top:g.y+"%",opacity:elig?1:(p?1:.62),outline:elig?"2px solid var(--accent)":"none"}}>
                  <div className={"gc-dot d-"+dotKey(p,s)}>{p?(hideR?"·":p.r):"+"}</div>
                  <div className="gc-name">{p?lastName(p.name):s.label}</div>
                </div>
              );
            })}
          </div>
          <div className="units">
            {units.map(u=>(
              <div key={u.k} className="unit">
                <div className="unit-top"><span className="unit-lbl">{u.label}</span><span className="unit-val">{hideR?"·":(u.r||"—")}</span></div>
                <div className="unit-bar"><div className={"unit-fill u-"+u.k} style={{width:(hideR?0:Math.max(0,Math.min(100,(u.r-55)/44*100)))+"%"}}/></div>
                <div className="unit-n">{u.n} player{u.n===1?"":"s"}</div>
              </div>
            ))}
          </div>
          <div className={"rankbox"+(complete?" final":"")}>
            {projRank?(<>
              <span className="rank-lbl">{complete?"Projected finish":"Projected rank (so far)"}</span>
              <span className="rank-val">{hideR?"#?":ordSuffix(projRank)} <span className="small">of {league.length+1}</span></span>
              <span className="rank-note">{hideR?"":(projRank<=4?"🏆 in the playoff places":"outside the top 4")}</span>
            </>):<span className="rank-lbl">Draft players to see your projected rank</span>}
          </div>
          <div className="xi">
            {(complete?battOrder.map(i=>slots[i]):slotsDisplay).map((s,idx)=>{
              const p=xi[s.i];
              const elig=spin && !p && squadPlayers.some(q=>{const e=eligibleSlot(q);return e&&e.i===s.i;});
              return (
                <div key={s.i} className={"slot"+(p?" filled":"")+(elig?" elig":"")}>
                  {complete
                    ? <span className="batpos">{idx+1}</span>
                    : <span className="slotrole">{s.label}</span>}
                  {p?(
                    <>
                      <span className="slotname">
                        <span className={"badge "+(p.ovs?"b-ovs":"b-ind")} style={{marginRight:7}}>{p.ovs?"OVS":"IND"}</span>
                        <b>{p.name}</b> <span className="small">· {ROLE_NAME[p.role==="BAT"?p.pos:p.role]}</span>
                      </span>
                      {complete && (
                        <span className="ord-arrows">
                          <button className="ord-btn" disabled={!canUp(idx)} title="Move up" onClick={()=>moveBat(idx,-1)}>▲</button>
                          <button className="ord-btn" disabled={!canDown(idx)} title="Move down" onClick={()=>moveBat(idx,1)}>▼</button>
                        </span>
                      )}
                      <span className="rating" style={{fontSize:15}}>{hideR?"·":p.r}</span>
                    </>
                  ):<span className="slotname small">— empty —</span>}
                </div>
              );
            })}
          </div>
          <div className="small" style={{marginTop:8}}>{complete
            ? "Reorder your batting line-up with the arrows — players can only move up to a spot they've actually batted historically."
            : "Top-order players can't fill a finisher slot and vice-versa. Middle-order players are flexible."}</div>
        </div>
      </div>
      <div className="small center" style={{marginTop:16,opacity:.6}}>
        {PLAYERS.length} player-seasons · 2008–2026 · independent fan project, inspired by 38-0.app · not affiliated with any league
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
